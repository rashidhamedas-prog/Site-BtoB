user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';

  access_log /var/log/nginx/access.log main;
  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 50M;

  # Docker's embedded DNS. Resolving upstream container names at request time
  # (via variables in proxy_pass below) means nginx picks up new container IPs
  # after a rebuild/recreate WITHOUT needing a manual restart — no more 502s
  # after every `docker compose up -d`.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # HTTP: certbot challenge + redirect to HTTPS
  server {
    listen 80;
    server_name poshaktaranom.com www.poshaktaranom.com poshaktaranom.ir www.poshaktaranom.ir api.poshaktaranom.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # www → apex canonical redirect (SEO + keeps API CORS single-origin)
  server {
    listen 443 ssl;
    http2 on;
    server_name www.poshaktaranom.com;

    ssl_certificate     /etc/nginx/ssl/poshaktaranom.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/poshaktaranom.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://poshaktaranom.com$request_uri;
  }

  # B2B Wholesale site — poshaktaranom.com
  server {
    listen 443 ssl;
    http2 on;
    server_name poshaktaranom.com;

    # Runtime-resolved upstreams (see resolver note above)
    set $web_upstream   http://web:3000;
    set $minio_upstream http://minio:9000;

    ssl_certificate     /etc/nginx/ssl/poshaktaranom.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/poshaktaranom.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # Next.js static assets — cache 1 year (content-hashed filenames)
    location /_next/static/ {
      proxy_pass $web_upstream;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=31536000, immutable";
      access_log off;
    }

    # Public files — fonts, images, icons
    location /fonts/ {
      proxy_pass $web_upstream;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=31536000, immutable";
      access_log off;
    }

    # Same-origin API proxy — /api/v1/* → api container.
    # Avoids the api. subdomain from browsers entirely (no CORS, immune to
    # per-subdomain DNS/VPN issues common on Iranian networks).
    location ^~ /api/ {
      set $api_upstream http://api:4000;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass $api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # MinIO product images — /media/* maps to bucket root.
    # ^~ makes this prefix win over the regex image-extension block below,
    # otherwise /media/foo.png would be routed to web:3000 (404).
    location ^~ /media/ {
      rewrite ^/media/(.*)$ /taranom-products/$1 break;
      proxy_pass $minio_upstream;
      proxy_set_header Host minio;
      add_header Cache-Control "public, max-age=2592000";
      add_header Access-Control-Allow-Origin "*";
      access_log off;
    }

    location ~* \.(ico|png|jpg|jpeg|webp|avif|svg|woff2|woff)$ {
      proxy_pass $web_upstream;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=2592000";
      access_log off;
    }

    # All other requests
    location / {
      proxy_pass $web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }
  }

  # NOTE: B2C Retail (poshaktaranom.ir) is intentionally NOT served from this
  # server. That domain is hosted externally on webzi.ir (DNS -> 31.214.255.53).
  # This Hetzner server only serves the B2B .com site + api subdomain.
  # Do NOT add a .ir server block or run certbot for .ir here — DNS doesn't point here.

  # API subdomain — api.poshaktaranom.com
  server {
    listen 443 ssl;
    http2 on;
    server_name api.poshaktaranom.com;

    set $api_upstream http://api:4000;

    ssl_certificate     /etc/nginx/ssl/poshaktaranom.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/poshaktaranom.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff;

    location /v1/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass $api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      limit_req zone=api burst=50 nodelay;
      proxy_pass $api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
