name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check web
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Type check API
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Build web
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://api.poshaktaranom.com

      - name: Build API
        run: npm run build
        working-directory: apps/api

  deploy:
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/taranom
            git fetch origin
            git reset --hard origin/master
            git log -1 --oneline
            docker compose build api web
            docker compose up -d api web
            docker compose restart nginx
            sleep 20
            # Apply schema for new product/discount/order columns when synchronize is off
            docker exec taranom_postgres psql -U taranom -d taranom_db -c "ALTER TABLE products ALTER COLUMN fabric DROP NOT NULL; ALTER TABLE products ALTER COLUMN fabric SET DEFAULT ''; ALTER TABLE products ADD COLUMN IF NOT EXISTS specs jsonb; ALTER TABLE products ADD COLUMN IF NOT EXISTS \"sizeType\" varchar NOT NULL DEFAULT 'FREE'; ALTER TABLE products ADD COLUMN IF NOT EXISTS \"isDiscounted\" boolean NOT NULL DEFAULT false; ALTER TABLE discount_codes ADD COLUMN IF NOT EXISTS \"startsAt\" TIMESTAMP; ALTER TABLE orders ADD COLUMN IF NOT EXISTS \"freightCost\" bigint NOT NULL DEFAULT 0; ALTER TABLE orders ADD COLUMN IF NOT EXISTS \"freightReceiptUrl\" varchar; ALTER TABLE orders ADD COLUMN IF NOT EXISTS \"intraCityFee\" bigint NOT NULL DEFAULT 0; ALTER TABLE orders ADD COLUMN IF NOT EXISTS \"perKgFee\" bigint NOT NULL DEFAULT 0; ALTER TABLE orders ADD COLUMN IF NOT EXISTS \"freeShipping\" boolean NOT NULL DEFAULT false; ALTER TABLE invoices ADD COLUMN IF NOT EXISTS \"intraCityFee\" bigint NOT NULL DEFAULT 0; ALTER TABLE invoices ADD COLUMN IF NOT EXISTS \"perKgFee\" bigint NOT NULL DEFAULT 0; ALTER TABLE invoices ADD COLUMN IF NOT EXISTS \"freeShipping\" boolean NOT NULL DEFAULT false; CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\"; CREATE TABLE IF NOT EXISTS product_spec_memory (id uuid NOT NULL DEFAULT uuid_generate_v4(), \"fieldKey\" varchar NOT NULL, value varchar NOT NULL, \"createdAt\" TIMESTAMP NOT NULL DEFAULT now(), \"updatedAt\" TIMESTAMP NOT NULL DEFAULT now(), CONSTRAINT \"PK_product_spec_memory_id\" PRIMARY KEY (id), CONSTRAINT \"UQ_product_spec_memory_field_value\" UNIQUE (\"fieldKey\", value)); CREATE TABLE IF NOT EXISTS tiered_discounts (id uuid NOT NULL DEFAULT uuid_generate_v4(), levels jsonb NOT NULL DEFAULT '[]', \"expiresAt\" TIMESTAMP, \"isActive\" boolean NOT NULL DEFAULT true, \"createdAt\" TIMESTAMP NOT NULL DEFAULT now(), \"updatedAt\" TIMESTAMP NOT NULL DEFAULT now(), CONSTRAINT \"PK_tiered_discounts_id\" PRIMARY KEY (id)); CREATE TABLE IF NOT EXISTS side_discounts (id uuid NOT NULL DEFAULT uuid_generate_v4(), type varchar NOT NULL, percent integer NOT NULL, threshold bigint NOT NULL DEFAULT 0, \"categoryId\" uuid, \"isActive\" boolean NOT NULL DEFAULT true, \"createdAt\" TIMESTAMP NOT NULL DEFAULT now(), \"updatedAt\" TIMESTAMP NOT NULL DEFAULT now(), CONSTRAINT \"PK_side_discounts_id\" PRIMARY KEY (id);"
            docker compose restart api
            sleep 10
            curl -sf http://localhost:4000/v1/health
            echo
            curl -sf -o /dev/null -w "web %{http_code}\n" http://localhost:3000
