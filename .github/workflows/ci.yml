name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check web
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Type check API
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Build web
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://api.poshaktaranom.com

      - name: Build API
        run: npm run build
        working-directory: apps/api

  deploy:
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          # Host and user are the already-documented public values; override via
          # repo secrets if the server changes. Only VPS_SSH_KEY must be set.
          host: ${{ secrets.VPS_HOST || '5.75.200.102' }}
          username: ${{ secrets.VPS_USER || 'wholesale-admin' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 2222 }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/taranom

            echo "=== Pull latest code ==="
            git fetch origin
            git reset --hard origin/master
            git log -1 --oneline

            echo "=== Rebuild & restart services ==="
            docker compose build api web
            docker compose up -d api web
            docker compose restart nginx

            # Schema for new product/discount/order/invoice columns is applied
            # automatically by the TypeORM migrations that run on API startup
            # (migrationsRun=true in production). We additionally run an
            # idempotent safety-net script in case migrations are skipped.
            echo "=== Apply idempotent schema safety-net ==="
            docker exec -i taranom_postgres psql -U taranom -d taranom_db \
              < scripts/apply-production-schema.sql

            echo "=== Restart API to pick up schema ==="
            docker compose restart api

            echo "=== Health checks ==="
            ok=0
            for i in $(seq 1 12); do
              if curl -sf http://localhost:4000/v1/health >/dev/null; then ok=1; break; fi
              echo "waiting for API... ($i)"; sleep 5
            done
            if [ "$ok" != "1" ]; then
              echo "API health check failed"; docker compose logs --tail 50 api; exit 1
            fi
            curl -sf http://localhost:4000/v1/health; echo
            curl -sf -o /dev/null -w "web %{http_code}\n" http://localhost:3000
            echo "=== DEPLOY COMPLETE ==="
