version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taranom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-taranom}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME:-taranom_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-taranom}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taranom_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASS}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: taranom_meili
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    ports:
      - '127.0.0.1:7700:7700'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 15s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: taranom_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-taranom_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS}
    volumes:
      - minio_data:/data
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: taranom_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_USER: ${MINIO_USER:-taranom_minio}
      MINIO_PASS: ${MINIO_PASS}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_USER $$MINIO_PASS;
      mc mb --ignore-existing local/taranom-products;
      mc anonymous set download local/taranom-products;
      echo 'MinIO bucket ready.';
      exit 0;
      "
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: taranom_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio
      MINIO_PUBLIC_URL: https://poshaktaranom.com/media
      MEILI_HOST: http://meilisearch:7700
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    ports:
      - '127.0.0.1:4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_RETAIL_URL: ${NEXT_PUBLIC_RETAIL_URL}
    container_name: taranom_web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - api
    ports:
      - '127.0.0.1:3000:3000'

  nginx:
    image: nginx:alpine
    container_name: taranom_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meili_data:
  certbot_www:
